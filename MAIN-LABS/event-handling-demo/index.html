<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Handling Demo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>JavaScript Event Handling Demo</h1>

    <!-- Click Event -->
    <button id="clickBtn">Click Me</button>

    <!-- Input / Change / Focus / Blur -->
    <input type="text" id="nameInput" placeholder="Type your name">

    <!-- Keyup Event -->
    <input type="text" id="keyInput" placeholder="Press any key">

    <!-- Mouse Events -->
    <div id="hoverBox">
      Hover your mouse here
    </div>

    <!-- Form Submit -->
    <form id="demoForm">
      <input type="text" id="formInput" placeholder="Enter something">
      <button type="submit">Submit Form</button>
    </form>

    <!-- Output Area -->
    <div class="output">
      <h3>Output:</h3>
      <p id="outputText">No events triggered yet.</p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
